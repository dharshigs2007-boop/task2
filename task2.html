<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Contact Form</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:500px;
        background:#fff;
        padding:30px;
        border-radius:10px;
        box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
        color:#333;
    }

    .form-group{
        margin-bottom:15px;
    }

    label{
        display:block;
        margin-bottom:5px;
        font-weight:bold;
        color:#555;
    }

    input,
    textarea,
    select{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:5px;
        font-size:16px;
        outline:none;
    }

    input:focus,
    textarea:focus,
    select:focus{
        border-color:#007bff;
    }

    textarea{
        resize:vertical;
    }

    .btn{
        width:100%;
        padding:12px;
        background:#007bff;
        color:white;
        border:none;
        border-radius:5px;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .btn:hover{
        background:#0056b3;
    }

    @media(max-width:600px){
        .container{
            padding:20px;
        }

        h2{
            font-size:24px;
        }

        input,
        textarea,
        select{
            font-size:14px;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h2>Contact Form</h2>

    <form>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" required>
        </div>

        <div class="form-group">
            <label>Course</label>
            <select required>
                <option value="">Select Course</option>
                <option>Web Development</option>
                <option>Python</option>
                <option>Java</option>
                <option>Data Science</option>
                <option>Cyber Security</option>
            </select>
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea rows="5" placeholder="Enter your message"></textarea>
        </div>

        <button type="submit" class="btn">Submit</button>
    </form>
</div>

</body>
</html>
